receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 512

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    send_timestamps: true
    metric_expiration: 180m
    enable_open_metrics: true

  otlphttp/jellyfish:
    endpoint: ${JELLYFISH_OTLP_ENDPOINT}
    headers:
      Authorization: "Bearer ${JELLYFISH_TOKEN}"

  otlphttp/loki:
    endpoint: http://loki:3100/otlp

  debug:
    verbosity: normal

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, otlphttp/jellyfish, debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki, debug]

  extensions: []

  telemetry:
    logs:
      level: "debug"